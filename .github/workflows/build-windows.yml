name: Build Blended (Windows)

# Produces a portable Blended-*.zip for Windows x64.
# Download from: Actions tab → latest run → Artifacts section.
# Or: create a tag (git tag v0.1.0 && git push --tags) to auto-create a GitHub Release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: 'CMake build type'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - RelWithDebInfo

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: windows-2022
    timeout-minutes: 360

    env:
      BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
      # Short paths to dodge Windows MAX_PATH issues
      SRC_DIR: D:\s
      BUILD_DIR: D:\b
      LIB_DIR: lib/windows_x64

    steps:
    # ── Checkout ──────────────────────────────────────────────
    - name: Checkout source
      uses: actions/checkout@v6
      with:
        path: src
        fetch-depth: 1
        lfs: false
        submodules: false

    - name: Compute submodule hash
      id: submod-hash
      shell: bash
      run: echo "hash=$(sha256sum src/.gitmodules | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

    - name: Move source to short path
      shell: cmd
      run: move src %SRC_DIR%

    # ── Precompiled libraries ─────────────────────────────────
    - name: Setup Git LFS
      shell: cmd
      run: |
        git lfs install
        git lfs version

    - name: Pull source LFS files
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -e

        # The checkout used lfs:false for speed. Pull LFS files now so
        # that assets like startup.blend are real files, not pointers.
        # The GitHub fork doesn't host LFS objects — they live on
        # projects.blender.org. Fetch directly from upstream.
        git remote add lfs-fallback "https://projects.blender.org/blender/blender.git"
        git config "remote.lfs-fallback.pushurl" "no_push"
        git lfs fetch lfs-fallback
        git lfs checkout

    - name: Restore library cache
      id: cache-libs
      uses: actions/cache@v5
      with:
        path: ${{ env.SRC_DIR }}/lib/windows_x64
        key: blender-libs-win-x64-${{ steps.submod-hash.outputs.hash }}
        restore-keys: blender-libs-win-x64-
      continue-on-error: true

    - name: Fetch precompiled libraries
      if: steps.cache-libs.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ env.SRC_DIR }}
      run: |
        set -e

        # .gitmodules sets "update = none" for all library submodules so
        # that Blender's make_update.py can manage them manually. Override
        # this for CI so git submodule update actually clones the repo.
        git config submodule."$LIB_DIR".update checkout

        # Stage 1: clone submodule metadata (skip LFS smudge to avoid
        # downloading binaries during clone — they are pulled separately).
        GIT_LFS_SKIP_SMUDGE=1 git submodule update --init --progress $LIB_DIR

        cd "$LIB_DIR"

        # Stage 2: pull the actual LFS binary files.
        # Origin already points to projects.blender.org (from .gitmodules)
        # so LFS objects are served from there directly.
        git lfs pull origin

    # ── Toolchain ─────────────────────────────────────────────
    - name: Setup MSVC 2022
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Ninja
      shell: cmd
      run: choco install ninja --yes --no-progress

    # ── Configure ─────────────────────────────────────────────
    - name: CMake configure
      shell: cmd
      run: >
        cmake
        -S %SRC_DIR%
        -B %BUILD_DIR%
        -G Ninja
        -DCMAKE_BUILD_TYPE=%BUILD_TYPE%
        -C "%SRC_DIR%/build_files/cmake/config/blended_release.cmake"

    # ── Build ─────────────────────────────────────────────────
    - name: Build
      shell: cmd
      run: cmake --build %BUILD_DIR% --target install --parallel %NUMBER_OF_PROCESSORS%

    # ── Package ───────────────────────────────────────────────
    - name: Create portable .zip
      id: package
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        # Read Blended version from source header
        $header = Get-Content "$env:SRC_DIR/source/blender/blenkernel/BKE_blender_version.h" -Raw
        $majorMatch = [regex]::Match($header, '#define BLENDED_VERSION_MAJOR (\d+)')
        $minorMatch = [regex]::Match($header, '#define BLENDED_VERSION_MINOR (\d+)')
        $patchMatch = [regex]::Match($header, '#define BLENDED_VERSION_PATCH (\d+)')

        if (-not $majorMatch.Success) {
          Write-Error "Failed to parse BLENDED_VERSION_MAJOR from version header"
          exit 1
        }

        $major = $majorMatch.Groups[1].Value
        $minor = if ($minorMatch.Success) { $minorMatch.Groups[1].Value } else { "0" }
        $patch = if ($patchMatch.Success) { $patchMatch.Groups[1].Value } else { "0" }

        $name = "Blended-$major.$minor.$patch-windows-x64"
        $zip  = "$name.zip"

        Write-Host "Version: $major.$minor.$patch"

        # Verify install directory exists
        $installDir = "$env:BUILD_DIR\bin"
        if (-not (Test-Path $installDir)) {
          Write-Error "Install directory not found: $installDir"
          exit 1
        }

        # Rename install dir and zip it
        Rename-Item $installDir $name
        Compress-Archive -Path "$env:BUILD_DIR\$name" -DestinationPath "$env:BUILD_DIR\$zip"

        # Export for later steps
        "PACKAGE_NAME=$zip"   | Out-File -Append $env:GITHUB_ENV
        "PACKAGE_PATH=$env:BUILD_DIR\$zip" | Out-File -Append $env:GITHUB_ENV
        "VERSION=$major.$minor.$patch" | Out-File -Append $env:GITHUB_ENV

        Write-Host "Packaged: $zip"

    # ── Upload ────────────────────────────────────────────────
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}
        path: ${{ env.PACKAGE_PATH }}
        retention-days: 90
        compression-level: 0  # already a .zip

    # ── Release (only on tags) ────────────────────────────────
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: Blended ${{ env.VERSION }}
        files: ${{ env.PACKAGE_PATH }}
        generate_release_notes: true
        draft: false

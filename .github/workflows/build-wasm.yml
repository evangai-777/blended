name: Build & Deploy Blended WebAssembly

# Builds Blended as a WebAssembly module using Emscripten and deploys
# to GitHub Pages.  The resulting site serves a full 3D editor in the browser.

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'intern/**'
      - 'build_files/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:
    inputs:
      emsdk_version:
        description: 'Emscripten SDK version'
        required: false
        default: '3.1.51'
        type: string

# Only one Pages deployment at a time.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

# Grant GITHUB_TOKEN permissions for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      EMSDK_VERSION: ${{ inputs.emsdk_version || '3.1.51' }}
      BUILD_DIR: build-wasm

    steps:
    # ── Checkout ──────────────────────────────────────────────
    - name: Checkout source
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        lfs: false
        submodules: false

    - name: Pull source LFS files
      continue-on-error: true
      run: |
        set -e
        git lfs install
        # LFS objects live on projects.blender.org, not on GitHub.
        git remote add lfs-fallback "https://projects.blender.org/blender/blender.git" || true
        git config "remote.lfs-fallback.pushurl" "no_push"
        git lfs fetch lfs-fallback || echo "::warning::LFS fetch failed — non-critical for WASM build"
        git lfs checkout || echo "::warning::LFS checkout failed — non-critical for WASM build"

    # ── Emscripten SDK ────────────────────────────────────────
    - name: Setup Emscripten SDK
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: ${{ env.EMSDK_VERSION }}
        actions-cache-folder: emsdk-cache
        no-cache: true

    - name: Verify Emscripten
      run: |
        emcc --version
        echo "EMSDK = $EMSDK"

    # ── System dependencies ───────────────────────────────────
    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          cmake \
          ninja-build \
          python3

    # ── Cache build artifacts ─────────────────────────────────
    - name: Cache CMake build
      uses: actions/cache@v5
      continue-on-error: true
      with:
        path: ${{ env.BUILD_DIR }}
        key: wasm-build-${{ env.EMSDK_VERSION }}-${{ hashFiles('CMakeLists.txt', 'build_files/cmake/config/blended_wasm.cmake') }}
        restore-keys: |
          wasm-build-${{ env.EMSDK_VERSION }}-

    # ── Configure ─────────────────────────────────────────────
    - name: CMake configure (Emscripten)
      run: |
        # Remove stale CMake cache if toolchain path changed between runs.
        rm -rf $BUILD_DIR/CMakeCache.txt $BUILD_DIR/CMakeFiles
        emcmake cmake \
          -S . \
          -B $BUILD_DIR \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -C build_files/cmake/config/blended_wasm.cmake

    # ── Build ─────────────────────────────────────────────────
    # NOTE: Emscripten's em++ uses ~2x more RAM than native compilers.
    # GitHub Actions runners have 7 GB RAM, so limit parallelism to 2
    # to avoid silent OOM kills (no error output, just "subcommand failed").
    - name: Build
      run: |
        emmake cmake --build $BUILD_DIR --parallel 2 2>&1 || {
          echo "::warning::Full build failed — this is expected during early WASM porting."
          echo "::warning::Check build output above for specific compilation errors."
          echo "BUILD_INCOMPLETE=true" >> $GITHUB_ENV
        }

    # ── Assemble deploy directory ─────────────────────────────
    - name: Assemble Pages site
      run: |
        set -e
        mkdir -p deploy

        # Copy web shell files.
        cp build_files/web/index.html     deploy/
        cp build_files/web/blended.js     deploy/
        cp build_files/web/blended.css    deploy/
        cp build_files/web/coi-serviceworker.min.js deploy/

        # Copy WASM build output (if the build produced it).
        # Search common Emscripten output locations.
        WASM_FOUND=false
        for dir in "$BUILD_DIR/bin" "$BUILD_DIR" "$BUILD_DIR/source/creator"; do
          if [ -f "$dir/blended.wasm" ] || [ -f "$dir/blender.wasm" ]; then
            wasm_file=$(find "$dir" -maxdepth 1 -name "*.wasm" | head -1)
            js_file=$(find "$dir" -maxdepth 1 -name "*.js" ! -name "*.worker.js" | head -1)
            worker_file=$(find "$dir" -maxdepth 1 -name "*.worker.js" | head -1)
            if [ -n "$wasm_file" ]; then
              cp "$wasm_file" deploy/blended.wasm
              WASM_FOUND=true
            fi
            if [ -n "$js_file" ]; then
              cp "$js_file" deploy/blended-module.js
            fi
            if [ -n "$worker_file" ]; then
              cp "$worker_file" deploy/blended.worker.js
            fi
            echo "WASM build output found in $dir"
            break
          fi
        done

        if [ "$WASM_FOUND" = false ]; then
          echo "::warning::No WASM binary found. Deploying web shell as placeholder."
          # Create a placeholder so the site still loads with a helpful message.
          echo "// Placeholder: WASM build not yet complete." > deploy/blended-module.js
        fi

        # Copy data files that Blender needs at startup (if they exist in the build).
        if [ -d "$BUILD_DIR/bin/datafiles" ]; then
          cp -r "$BUILD_DIR/bin/datafiles" deploy/
        fi

        echo "Deploy directory contents:"
        ls -la deploy/

    # ── Upload Pages artifact ─────────────────────────────────
    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: deploy

  # ── Deploy to GitHub Pages ──────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build-wasm
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
